# Deploy backend to Hugging Face Spaces (Docker)
# Usage:
# 1) 在 GitHub 仓库 Settings → Secrets → Actions 添加 `HF_TOKEN`（你的 Hugging Face token）。
# 2) 打开 Actions → Deploy to HF Space → Run workflow。
# 3) 完成后日志会打印 Space 链接，形如 https://huggingface.co/spaces/<user>/airon-backend

name: Deploy to HF Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # pin to a recent version to avoid missing symbols
          pip install "huggingface_hub>=0.23.4"

      - name: Deploy to Spaces (auto use token owner)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SPACE_NAME: airon-backend
        run: |
          python - <<'PY'
          import os, sys
          from huggingface_hub import HfApi

          token = os.getenv("HF_TOKEN")
          space_name = os.getenv("SPACE_NAME", "airon-backend")
          if not token:
              sys.exit("HF_TOKEN secret is missing. Set it in GitHub Settings → Secrets and re-run.")

          api = HfApi(token=token)
          user = api.whoami()["name"]
          repo_id = f"{user}/{space_name}"

          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Deploy to Hugging Face Space",
              ignore_patterns=[
                  ".git*",
                  ".github/*",
                  "deploy/*.zip",
                  "frontend/node_modules*",
                  "**/__pycache__/*",
              ],
          )

          print(f"Space URL: https://huggingface.co/spaces/{repo_id}")
          print(f"Live:      https://{repo_id.replace('/', '-')}.hf.space")
          PY
