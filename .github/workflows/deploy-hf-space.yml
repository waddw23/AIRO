# Deploy backend to Hugging Face Spaces (Docker)
# Usage:
# 1) 在 GitHub 仓库 Settings → Secrets → Actions 添加 `HF_TOKEN`（你的 Hugging Face token）。
# 2) 打开 Actions → Deploy to HF Space → Run workflow。
# 3) 完成后日志会打印 Space 链接，形如 https://huggingface.co/spaces/<user>/airon-backend

name: Deploy to HF Space

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install "huggingface_hub>=0.20.3"

      - name: Deploy to Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          api = HfApi(token=token)
          user = api.whoami()["name"]
          repo_id = f"{user}/airon-backend"

          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              commit_message="Deploy to Hugging Face Space",
              ignore_patterns=[
                  ".git*",
                  ".github/*",
                  "deploy/*.zip",
                  "frontend/node_modules*",
                  "**/__pycache__/*",
              ],
          )

          print(f"Space URL: https://huggingface.co/spaces/{repo_id}")
          PY
